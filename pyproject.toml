[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cortex-context-engine"
version = "0.1.0"
description = "Local-first git-native context engine with graph, provenance, and token-budgeted retrieval bundles."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "OpenAI Codex" }
]
dependencies = []

[project.optional-dependencies]
llm   = ["anthropic>=0.40", "openai>=1.0"]
graph = ["networkx>=3.0"]

[project.scripts]
cortex = "cortex.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
cortex = ["skill-codex.md", "skill-claude.md"]
