name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[llm,languages,watch]" pytest build

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run evals
        run: python evals/run_evals.py

      - name: Build package
        run: python -m build
