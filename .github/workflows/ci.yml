name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[llm,watch]" pytest build twine

      - name: Prepare locked parser runtime
        run: python -m cortex runtime setup

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run explicit regex fallback suite
        env:
          CORTEX_FORCE_REGEX: "1"
          CORTEX_RUNTIME_NETWORK: "0"
        run: >-
          python -m pytest -q
          tests/test_structural_dispatch.py
          tests/test_qt_relations.py
          tests/test_qt_emits.py
          tests/test_context_mcp.py
          tests/test_qml_full_support.py
          tests/test_qml_modules.py
          tests/test_qml_resolution.py

      - name: Run evals
        run: python evals/run_evals.py

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*
